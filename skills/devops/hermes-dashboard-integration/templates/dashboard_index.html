<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERMES AGENT MISSION CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@300;400&display=swap');
        body { background-color: #0a0a1a; color: #e0e0e0; font-family: 'Roboto Mono', monospace; }
        .cyber-panel { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(0,240,255,0.3); box-shadow: 0 0 20px rgba(0,240,255,0.1); }
        .glowing-text { text-shadow: 0 0 5px #00f0ff, 0 0 10px #00f0ff, 0 0 20px #00f0ff; }
        .nav-link { transition: all 0.3s ease; border-left: 3px solid transparent; }
        .nav-link:hover, .nav-link.active { background: linear-gradient(90deg, rgba(0,240,255,0.2), transparent); border-left: 3px solid #00f0ff; color: #00f0ff; }
        .progress-bar-container { background: rgba(0,240,255,0.1); border: 1px solid rgba(0,240,255,0.3); padding: 2px; }
        .progress-bar { background: linear-gradient(90deg, #b026ff, #00f0ff); box-shadow: 0 0 10px #00f0ff; }
    </style>
</head>
<body class="p-4">
    <div class="flex h-[calc(100vh-2rem)]">
        <nav class="w-20 flex flex-col items-center py-8 space-y-8 cyber-panel mr-4 rounded-lg">
            <i class="fas fa-satellite-dish text-2xl text-[#00f0ff] glowing-text"></i>
            <a href="#" class="nav-link active w-full py-4 flex justify-center"><i class="fas fa-tachometer-alt text-2xl"></i></a>
            <a href="#" class="nav-link w-full py-4 flex justify-center"><i class="fas fa-users-cog text-2xl"></i></a>
            <a href="#" class="nav-link w-full py-4 flex justify-center"><i class="fas fa-tasks text-2xl"></i></a>
            <a href="#" class="nav-link w-full py-4 flex justify-center"><i class="fas fa-cogs text-2xl"></i></a>
        </nav>
        <div class="flex-1 flex flex-col">
            <header class="flex justify-between items-center p-4 cyber-panel rounded-lg mb-4">
                <h1 class="text-2xl font-bold glowing-text" style="font-family: 'Orbitron', sans-serif;">HERMES AGENT MISSION CONTROL</h1>
                <div class="px-4 py-2 border-2 border-green-400 rounded-full"><span class="text-green-400 font-bold animate-pulse">ALL SYSTEMS OPERATIONAL</span></div>
            </header>
            <div class="flex-1 grid grid-rows-3 gap-4">
                <div class="row-span-1 grid grid-cols-3 gap-4">
                    <div class="col-span-1 cyber-panel rounded-lg p-4 flex flex-col items-center justify-center">
                        <h2 class="font-bold text-[#00f0ff] mb-2">MISSION RADAR</h2>
                        <canvas id="missionRadar"></canvas>
                    </div>
                    <div class="col-span-1 cyber-panel rounded-lg p-4">
                        <h2 class="font-bold text-[#00f0ff] mb-4">CURRENT DIRECTIVE</h2>
                        <div class="space-y-3">
                            <div><p class="text-sm mb-1">Context Window</p><div class="progress-bar-container rounded-full"><div class="progress-bar h-3 rounded-full" style="width: 75%"></div></div></div>
                        </div>
                    </div>
                    <div class="col-span-1 cyber-panel rounded-lg p-4">
                        <h2 class="font-bold text-[#00f0ff] mb-4">VPS HEALTH</h2>
                        <div id="system-health-bars" class="space-y-3"></div>
                    </div>
                </div>
                <div class="row-span-1 cyber-panel rounded-lg p-4">
                    <h2 class="font-bold text-[#b026ff] mb-2">GATEWAY STATUS</h2>
                </div>
                <div class="row-span-1 cyber-panel rounded-lg p-4 overflow-y-auto">
                    <h2 class="font-bold text-emerald-400 mb-2">ACTIVITY LOG</h2>
                    <table class="w-full text-left text-sm">
                        <thead class="border-b border-cyan-400/50"><tr><th class="p-2">AGENT</th><th class="p-2">SUMMARY</th><th class="p-2">STATUS</th></tr></thead>
                        <tbody id="log-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
<script>
    const radarCtx = document.getElementById('missionRadar').getContext('2d');
    new Chart(radarCtx, {
        type: 'radar',
        data: {
            labels: ['Planning', 'Execution', 'Learning', 'Adaptation', 'Stealth', 'Efficiency'],
            datasets: [{ label: 'Agent Capabilities', data: [90, 85, 75, 95, 60, 88], backgroundColor: 'rgba(176,38,255,0.2)', borderColor: '#b026ff', pointBackgroundColor: '#b026ff' }]
        },
        options: { scales: { r: { angleLines: { color: 'rgba(255,255,255,0.2)' }, grid: { color: 'rgba(255,255,255,0.2)' }, pointLabels: { color: '#e0e0e0' }, ticks: { backdropColor: 'transparent' } } }, plugins: { legend: { display: false } } }
    });
    async function fetchSystemHealth() {
        const res = await fetch('/api/system-health');
        const data = await res.json();
        document.getElementById('system-health-bars').innerHTML = `
            <div><p class="text-sm">CPU</p><div class="progress-bar-container"><div class="progress-bar h-2" style="width: ${data.cpu}%"></div></div></div>
            <div><p class="text-sm">RAM</p><div class="progress-bar-container"><div class="progress-bar h-2" style="width: ${data.ram}%"></div></div></div>
            <div><p class="text-sm">DISK</p><div class="progress-bar-container"><div class="progress-bar h-2" style="width: ${data.disk}%"></div></div></div>`;
    }
    async function fetchLogs() {
        const res = await fetch('/api/logs');
        const logs = await res.json();
        document.getElementById('log-table-body').innerHTML = logs.map(log => `
            <tr class="border-b border-cyan-400/20">
                <td class="p-2 text-[#00f0ff]">${log.agent_name}</td>
                <td class="p-2">${log.task_summary}</td>
                <td class="p-2 ${log.status.toLowerCase().includes('success') ? 'text-green-400' : 'text-red-400'}">${log.status}</td>
            </tr>`).join('');
    }
    fetchSystemHealth(); fetchLogs();
    setInterval(() => { fetchSystemHealth(); fetchLogs(); }, 5000);
</script>
</body>
</html>
